<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fdfdfc"/>
      <stop offset="1" stop-color="#f5f3ee"/>
    </linearGradient>
    <radialGradient id="glow" cx="20%" cy="80%" r="60%">
      <stop offset="0" stop-color="#e85d2a" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#e85d2a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="85%" cy="20%" r="55%">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="rgba(0,0,0,0.05)"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- top status bar -->
  <g transform="translate(80, 80)">
    <rect width="60" height="22" rx="11" fill="#16a34a" fill-opacity="0.1" stroke="#16a34a" stroke-opacity="0.25"/>
    <circle cx="14" cy="11" r="3.2" fill="#16a34a"/>
    <text x="24" y="15" font-family="ui-monospace, Menlo, monospace" font-size="9" font-weight="500" fill="#16a34a" letter-spacing="0.5">OPEN</text>
  </g>

  <!-- name plate -->
  <g transform="translate(1010, 70)">
    <rect width="110" height="40" rx="8" fill="#111110"/>
    <text x="55" y="26" text-anchor="middle" font-family="Geist, system-ui, sans-serif" font-size="18" font-weight="600" fill="#fdfdfc">muart.</text>
  </g>

  <!-- main title -->
  <g transform="translate(80, 230)">
    <text font-family="Geist, system-ui, sans-serif" font-size="92" font-weight="600" fill="#111110" letter-spacing="-2">
      <tspan x="0" y="0">Product engineer</tspan>
      <tspan x="0" y="98">building </tspan>
      <tspan font-family="Instrument Serif, serif" font-style="italic" font-weight="400" font-size="100" fill="#e85d2a">real things</tspan>
      <tspan font-family="Geist, system-ui, sans-serif" font-style="normal" font-weight="600" font-size="92" fill="#111110">.</tspan>
    </text>
  </g>

  <!-- bottom row -->
  <g transform="translate(80, 540)">
    <text font-family="ui-monospace, Menlo, monospace" font-size="14" font-weight="500" fill="#666" letter-spacing="2">
      iOS · WEB · BACKEND · PAYMENTS
    </text>
  </g>

  <g transform="translate(80, 575)">
    <text font-family="Geist, system-ui, sans-serif" font-size="18" fill="#888">
      muart.dev
    </text>
  </g>

  <!-- accent line bottom right -->
  <line x1="900" y1="555" x2="1120" y2="555" stroke="#e85d2a" stroke-width="2" stroke-linecap="round"/>
  <circle cx="1130" cy="555" r="5" fill="#e85d2a"/>
</svg>
