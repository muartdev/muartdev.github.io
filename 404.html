<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Page not found — Murat" />
  <meta name="theme-color" content="#fdfdfc" />
  <meta name="robots" content="noindex" />
  <title>404 — Murat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="muart.png" />
  <meta property="og:title" content="404 — page not lost forever" />
  <meta property="og:description" content="The page you were looking for doesn't exist. Yet." />
  <meta property="og:image" content="https://muartdev.github.io/og.png" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <style>
    :root {
      --bg: #fdfdfc;
      --bg-soft: #f7f5f2;
      --text: #111110;
      --text-soft: #666666;
      --muted: #888888;
      --line: rgba(0, 0, 0, 0.08);
      --line-2: rgba(0, 0, 0, 0.14);
      --orange: #e85d2a;
      --violet: #8b5cf6;
      --cyan: #22d3ee;
      --sans: "Geist", system-ui, -apple-system, sans-serif;
      --mono: "Geist Mono", ui-monospace, monospace;
      --serif: "Instrument Serif", "Times New Roman", serif;
    }
    [data-theme="dark"] {
      --bg: #0b0b0b;
      --bg-soft: #131313;
      --text: #ededed;
      --text-soft: #8e8e8e;
      --muted: #5e5e5e;
      --line: rgba(255, 255, 255, 0.06);
      --line-2: rgba(255, 255, 255, 0.14);
      --orange: #ff7a3d;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      transition: background 0.4s ease, color 0.4s ease;
      display: grid;
      place-items: center;
      padding: 32px 24px;
    }
    .serif { font-family: var(--serif); font-style: italic; font-weight: 400; }
    .mono { font-family: var(--mono); }
    a { color: inherit; text-decoration: none; }
    .frame {
      width: min(720px, 100%);
      text-align: center;
    }
    .crumbs {
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 24px;
    }
    .crumbs a:hover { color: var(--text); }
    h1 {
      font-size: clamp(4rem, 14vw, 9rem);
      line-height: 0.95;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }
    h1 .accent {
      color: var(--orange);
      font-family: var(--serif);
      font-style: italic;
      font-weight: 400;
    }
    .lede {
      font-size: 1.05rem;
      color: var(--text-soft);
      max-width: 38ch;
      margin: 0 auto 36px;
    }
    .actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      height: 46px; padding: 0 24px; border-radius: 100px;
      font-size: 0.92rem; font-weight: 500;
      transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
    }
    .btn-primary { background: var(--text); color: var(--bg); }
    .btn-primary:hover {
      animation: glow 4s ease-in-out infinite;
    }
    .btn-secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--line-2);
    }
    .btn-secondary:hover { border-color: var(--text); }
    @keyframes glow {
      0%, 100% { box-shadow: 0 0 0 3px color-mix(in srgb, var(--orange) 14%, transparent), 0 6px 22px -4px color-mix(in srgb, var(--orange) 55%, transparent); }
      33% { box-shadow: 0 0 0 3px color-mix(in srgb, var(--violet) 14%, transparent), 0 6px 22px -4px color-mix(in srgb, var(--violet) 55%, transparent); }
      66% { box-shadow: 0 0 0 3px color-mix(in srgb, var(--cyan) 14%, transparent), 0 6px 22px -4px color-mix(in srgb, var(--cyan) 55%, transparent); }
    }
    .grid {
      position: fixed; inset: 0;
      background:
        linear-gradient(var(--line) 1px, transparent 1px) 0 0 / 48px 48px,
        linear-gradient(90deg, var(--line) 1px, transparent 1px) 0 0 / 48px 48px;
      mask-image: radial-gradient(circle at 50% 40%, #000 0%, transparent 70%);
      -webkit-mask-image: radial-gradient(circle at 50% 40%, #000 0%, transparent 70%);
      pointer-events: none;
      z-index: -1;
    }
  </style>
</head>
<body>
  <div class="grid"></div>
  <div class="frame">
    <p class="crumbs"><a href="/">muart.dev</a> &nbsp;/&nbsp; not found</p>
    <h1>4<span class="accent">o</span>4</h1>
    <p class="lede">This page slipped through the build pipeline. Or it never shipped.</p>
    <div class="actions">
      <a class="btn btn-primary" href="/">Take me home</a>
      <a class="btn btn-secondary" href="mailto:muartmac@gmail.com">Tell me what was here</a>
    </div>
  </div>
  <script>
    (() => {
      const t = localStorage.getItem("theme");
      if (t === "dark") document.documentElement.setAttribute("data-theme", "dark");
    })();
  </script>
</body>
</html>
